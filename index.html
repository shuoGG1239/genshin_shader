<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Genshin Toon · Nahida</title>
  </head>
  <body>
    <div id="app">
      <div class="hud">
        <div class="panel">
          <h1>原神风格卡通渲染</h1>
          <p>Three.js · Nahida</p>

          <div class="row">
            <label>模型</label>
            <div class="model-switch">
              <button type="button" id="modelPmx" class="active">PMX</button>
              <button type="button" id="modelFbx">FBX</button>
            </div>
          </div>

          <div class="row">
            <label>Ramp 强度</label>
            <input id="rampMix" type="range" min="0" max="1" step="0.01" value="0.35" />
          </div>
          <div class="row">
            <label>阴影软硬</label>
            <input id="shadeSoft" type="range" min="0.02" max="0.35" step="0.01" value="0.08" />
          </div>
          <div class="row">
            <label>阴影偏移</label>
            <input id="shadeOffset" type="range" min="-0.4" max="0.4" step="0.01" value="0.02" />
          </div>
          <div class="row">
            <label>边缘光</label>
            <input id="rim" type="range" min="0" max="1.5" step="0.01" value="0.45" />
          </div>
          <div class="row">
            <label>高光</label>
            <input id="spec" type="range" min="0" max="1.5" step="0.01" value="0.55" />
          </div>
          <div class="row">
            <label>描边</label>
            <input id="outline" type="range" min="0" max="0.006" step="0.0001" value="0" />
          </div>
          <div class="row">
            <label>自动旋转</label>
            <input id="autoRotate" type="checkbox" />
          </div>

          <div class="section">部件显示</div>
          <div id="partPanel">加载模型后可切换…</div>

          <div id="status" class="status">正在加载模型…</div>
        </div>
        <div class="hint">左键旋转 · 右键平移 · 滚轮缩放</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
